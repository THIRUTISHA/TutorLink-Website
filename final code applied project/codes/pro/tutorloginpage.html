<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TutorLink</title>
  <link rel="stylesheet" href="page.css">
</head>
<body>
  <!-- Header Section -->
  <header>
    <div class="brand">TutorLink</div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
      </ul>
    </nav>
  </header>

  <!-- Login Section -->
  <section class="login-section">
    <div class="content">
      <fieldset>
        <h1> Tutor Login</h1>
        <br>
        <p align="center">Enter your credentials to access your dashboard</p>
        <br><br>

        <!-- Login Form -->
        <form id="login-form" autocomplete="on">
          <div class="form-group">
            <label for="email">University Email</label>
            <input type="email" id="email" name="email" required placeholder="Enter your university email" />
          </div>
            <br>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password" />
          </div>

          <button type="submit" class="btn">Login</button>


          <!-- Forgot Password Link -->
          <div class="forgot-password">
            <a href="forgetpasswordpage.html">Forgot password?</a>

          </div>
        </form>
    </div>
    </fieldset>
  </section>

  <!-- Footer Section -->
  <section class="contact-footer">
    <div class="contact">
      <h3>Contact Us</h3>
      <p>Email us at: <a href="mailto:info@tutorplatform.com">info@tutorplatform.com</a></p>
      <p style=>phone Number : 021222000</p>
    </div>
    <footer>
      <p>&copy; 2025 TutorLink</p>
    </footer>
  </section>
  <script type="module" src="firebase.js"></script>
</body>
</html>
