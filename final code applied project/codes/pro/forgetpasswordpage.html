<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - TutorLink</title>
  <link rel="stylesheet" href="page.css">
</head>
<body>

  <!-- Header Section -->
  <header>
    <div class="brand">TutorLink</div>
    <nav>
      <ul>
        <li><a href="homepage.html">Home</a></li>
      </ul>
    </nav>
  </header>

  <!-- Forgot Password Section -->
  <section class="login-section">
    <div class="content">
      <fieldset>
        <h1>Forgot Password</h1>
        <br>
        <p>Enter your university email to reset your password</p>
        <br><br>

        <form id="forgot-password-form">
          <div class="form-group">
            <label for="reset-email">University Email</label>
            <input type="email" id="reset-email" name="email" required placeholder="Enter your university email">
          </div>

          <button type="submit" class="btn">Send Reset Link</button>
        </form>

        <p class="signup-link">
          Remembered your password? 
          <a href="studentloginpage.html">Student Login</a> | 
          <a href="tutorloginpage.html">Tutor Login</a>
        </p>
      </fieldset>
    </div>
  </section>
<script type="module" src="firebase.js"></script>
</body>
</html>
