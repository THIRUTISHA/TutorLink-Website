<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tutor Signup - TutorLink</title>
  <link rel="stylesheet" href="page.css" />
</head>
<body>
  <header>
    <div class="brand">TutorLink</div>
    <nav>
      <ul>
        <li><a href="homepage.html">Home</a></li>
      </ul>
    </nav>
  </header>

  <section class="signup-section">
    <fieldset>
      <h1>Tutor Signup</h1>
      <p align="center">Create your tutor account and list your subjects</p>
        <br>
      <form id="tutor-signup-form" autocomplete="on">
        <div class="form-group">
          <label for="t-name">Full Name</label>
          <input id="t-name" name="name" type="text" required placeholder="Your full name">
        </div>

        <div class="form-group">
          <label for="t-email">University Email</label>
          <input id="t-email" name="email" type="email" required placeholder="you@university.edu">
        </div>

        <div class="form-group">
          <label for="t-subjects">Expert Subjects (comma separated)</label>
          <input id="t-subjects" name="subjects" type="text" placeholder="eg. Mathematics, Physics, Statistics">
        </div>

        <div class="form-group">
          <label for="t-availability">Available Days / Times</label>
          <input id="t-availability" name="availability" type="text" placeholder="eg. Mon/Fri 8am-5pm">
        </div>

        <div class="form-group">
          <label for="t-lang">Languages you teach</label>
          <select id="t-lang" name="languages" multiple>
            <option value="English">English</option>
            <option value="Tamil">Tamil</option>
            <option value="Sinhala">Sinhala</option>
          </select>
          <small>Hold Ctrl (or Cmd) to select multiple</small>
        </div>

        <div class="form-group">
          <label for="t-password">Password</label>
          <input id="t-password" name="password" type="password" required placeholder="Choose a secure password">
        </div>

        <button type="submit" class="btn">Signup as Tutor</button>
      </form>

      <p align="center" class="signup-link">Already have an account? <a href="tutorloginpage.html">Login</a></p>
    </fieldset>
  </section>

  <section class="contact-footer">
    <div class="contact">
      <h3>Contact Us</h3>
      <p>Email: <a href="mailto:info@tutorplatform.com">info@tutorplatform.com</a></p>
    </div>
    <footer>
      <p>&copy; 2025 TutorLink</p>
    </footer>
  </section>

<script type="module" src="firebase.js"></script>
</body>
</html>
